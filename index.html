<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Flight Simulator 1 - Realista</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="menu">
    <h1>Flight Simulator 1</h1>
    <p>v0.4 Realista — mundo aberto, sem paredes invisíveis</p>
    <button id="start">Jogar</button>
  </div>

  <div id="hud">
    <strong>FLIGHT SIMULATOR 1</strong>
    <div>Velocidade: <span id="speed">0</span> km/h</div>
    <div>Altitude: <span id="alt">0</span> m</div>
    <div>Potência: <span id="thr">0</span>%</div>
    <div>Combustível: <span id="fuel">100</span>%</div>
    <div>Câmera: <span id="cam">Externa</span></div>
    <small>W/S potência • Setas voar • A/D leme • C câmera • R reset</small>
  </div>

  <div id="controls">
    <button id="up">▲</button>
    <div>
      <button id="left">◀</button>
      <button id="power">POTÊNCIA</button>
      <button id="right">▶</button>
    </div>
    <button id="down">▼</button>
    <div>
      <button id="brake">FREAR</button>
      <button id="camera">CÂMERA</button>
      <button id="reset">RESET</button>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
